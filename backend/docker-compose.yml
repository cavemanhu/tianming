version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tianming-dimis
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=tianming
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=tianming_dimis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WECHAT_APPID=${WECHAT_APPID}
      - WECHAT_SECRET=${WECHAT_SECRET}
      - WECHAT_PAY_MCHID=${WECHAT_PAY_MCHID}
      - WECHAT_PAY_KEY=${WECHAT_PAY_KEY}
      - WECHAT_PAY_NOTIFY_URL=${WECHAT_PAY_NOTIFY_URL}
    depends_on:
      - db
      - redis
    networks:
      - tianming-net

  db:
    image: mysql:8.0
    container_name: tianming-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=tianming_dimis
      - MYSQL_USER=tianming
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tianming-net

  redis:
    image: redis:7-alpine
    container_name: tianming-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tianming-net

  nginx:
    image: nginx:alpine
    container_name: tianming-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - tianming-net

volumes:
  mysql_data:
  redis_data:
  nginx_logs:

networks:
  tianming-net:
    driver: bridge
